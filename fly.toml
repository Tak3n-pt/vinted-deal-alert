app = "vinted-deal-alert-dashboard"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DASHBOARD_PORT = "3000"
  DATABASE_PATH = "/data/deals.sqlite"
  DASHBOARD_COOKIE_SECURE = "true"
  PROVIDER_TYPE = "apify"
  APIFY_ACTOR_ID = "epicscrapers~vinted-search-scraper"
  POLL_INTERVAL_SECONDS = "900"
  PROVIDER_TIMEOUT_SECONDS = "20"
  MAX_PRODUCTS_PER_SCAN = "100"
  HEARTBEAT_EVERY_SCANS = "4"
  RUN_ON_START = "false"
  DRY_RUN = "true"

[[mounts]]
  source = "vinted_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
